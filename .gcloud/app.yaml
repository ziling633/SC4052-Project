# Google Cloud Run configuration for backend
runtime: python311

# Service name
service: campus-flow-api

# Environment variables
env: flex

# Runtime configuration
entrypoint: uvicorn main:app --host 0.0.0.0 --port 8080

# Resources
resources:
  cpu: 1
  memory_gb: 0.5
  disk_size_gb: 1

# Environment variables (add more in Cloud Run Console)
env_variables:
  PYTHONUNBUFFERED: "TRUE"
  ENV: production

# Automatic scaling
automatic_scaling:
  min_instances: 1
  max_instances: 10
  target_cpu_utilization: 0.8

# Health check
health_check:
  enable_health_checks: true

# Allow unauthenticated access
allows_unauth_public_source: true
